name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version-file: ".python-version"
          enable-cache: true
      - name: Sync deps
        run: uv sync --locked
      # Ratchet gate: fails only on NEW errors, baselined ones tracked in mypy-baseline.txt.
      # set +o pipefail — mypy always exits non-zero on baselined errors; filter's exit is the real gate.
      - name: Mypy (baseline ratchet)
        run: |
          set +o pipefail
          uv run mypy src/tr_shared/ | uv run mypy-baseline filter

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Enables @pytest.mark.integration tests against the real Redis service.
      TEST_REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version-file: ".python-version"
          enable-cache: true
      - name: Sync deps
        run: uv sync --locked
      # Hand-picked scope — the full suite has pre-existing failures in
      # unrelated modules (tests/unit/celery, tests/unit/integrations/pf).
      - name: Pytest (event consumer + S2S contracts)
        run: >-
          uv run pytest
          tests/unit/events tests/integration tests/contracts
          tests/test_consumer.py tests/test_version_parity.py
          --no-cov
