name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version-file: ".python-version"
          enable-cache: true
      - name: Sync deps
        run: uv sync --locked
      # Baseline/ratchet mypy gate. tr-shared-lib carries ~118 legacy type errors
      # (mostly no-untyped-def / no-any-return on internal code, tracked in
      # mypy-baseline.txt). This step fails only on NEW type errors a change
      # introduces, so type debt can't grow while the baseline shrinks over time.
      # Public-signature regressions (like the include_object return type) are
      # caught here before they reach consumers. `set +o pipefail` because mypy
      # exits non-zero whenever any baselined error exists — filter's exit is the
      # real gate.
      - name: Mypy (baseline ratchet)
        run: |
          set +o pipefail
          uv run mypy src/tr_shared/ | uv run mypy-baseline filter
